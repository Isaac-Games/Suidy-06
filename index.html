<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    min-height: 100vh;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 480px;
    padding: 32px 24px;
    height: fit-content;
  }
  h1 {
    font-size: 24px;
    color: #1a1a2e;
    margin-bottom: 24px;
    text-align: center;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: #4361ee; }
  .input-row button {
    padding: 12px 20px;
    background: #4361ee;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .input-row button:hover { background: #3a56d4; }
  .count {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
  }
  ul { list-style: none; }
  li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 12px;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s;
  }
  li:hover { background: #fafafa; }
  li.checked span { text-decoration: line-through; color: #aaa; }
  li input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: #4361ee;
    cursor: pointer;
    flex-shrink: 0;
  }
  li span {
    flex: 1;
    font-size: 15px;
    color: #333;
    word-break: break-word;
  }
  li button {
    background: none;
    border: none;
    color: #ccc;
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  li button:hover { color: #e74c3c; background: #fef2f2; }
  .empty {
    text-align: center;
    color: #bbb;
    padding: 40px 0;
    font-size: 15px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🛒 쇼핑 리스트</h1>
  <div class="input-row">
    <input type="text" id="itemInput" placeholder="아이템을 입력하세요" autofocus>
    <button onclick="addItem()">추가</button>
  </div>
  <div class="count" id="count"></div>
  <ul id="list"></ul>
  <div class="empty" id="empty">리스트가 비어있습니다</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://fhieuoargbkbqplrhvgd.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoaWV1b2FyZ2JrYnFwbHJodmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzODk4ODMsImV4cCI6MjA4Nzk2NTg4M30.UwMeo9SOp2sR3Ff4T2iNsboipJOfk_vfq7xyWy4B7j4';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let items = [];

  async function loadItems() {
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: true });
    if (error) {
      console.error('Load error:', error);
      return;
    }
    items = data;
    render();
  }

  async function addItem() {
    const input = document.getElementById('itemInput');
    const name = input.value.trim();
    if (!name) return;
    input.value = '';
    input.focus();

    const { data, error } = await db
      .from('shopping_items')
      .insert({ name, checked: false })
      .select()
      .single();
    if (error) {
      console.error('Insert error:', error);
      return;
    }
    items.push(data);
    render();
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;
    const newChecked = !item.checked;

    const { error } = await db
      .from('shopping_items')
      .update({ checked: newChecked })
      .eq('id', id);
    if (error) {
      console.error('Update error:', error);
      return;
    }
    item.checked = newChecked;
    render();
  }

  async function remove(id) {
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('id', id);
    if (error) {
      console.error('Delete error:', error);
      return;
    }
    items = items.filter(i => i.id !== id);
    render();
  }

  function render() {
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');
    list.innerHTML = '';

    if (items.length === 0) {
      empty.style.display = 'block';
      count.textContent = '';
      return;
    }

    empty.style.display = 'none';
    const done = items.filter(i => i.checked).length;
    count.textContent = `총 ${items.length}개 중 ${done}개 완료`;

    items.forEach(item => {
      const li = document.createElement('li');
      if (item.checked) li.classList.add('checked');
      li.innerHTML = `
        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle(${item.id})">
        <span>${escapeHtml(item.name)}</span>
        <button onclick="remove(${item.id})" title="삭제">&times;</button>
      `;
      list.appendChild(li);
    });
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  document.getElementById('itemInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  loadItems();
</script>
</body>
</html>
